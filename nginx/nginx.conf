# 1. Definición del límite
limit_req_zone $remote_addr zone=voting_limit:10m rate=1r/s;

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }

    # 2. App de Resultados (Dashboard)
    location /results/ {
        limit_req zone=voting_limit burst=1 nodelay;
        limit_req_status 429;
        proxy_pass http://result:80/;
    }

    # 3. Socket.io
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 4. Assets EXCLUSIVOS de RESULTADOS
    # Usamos la ruta /results/ para identificar que vienen del dashboard
    location ~* /results/.*(angular\.min\.js|app\.js|socket\.io\.js|style\.css)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 5. Assets de VOTACIÓN (Java)
    # Mandamos las carpetas y el style.css de la raíz al contenedor de votación
    location ~* ^/(stylesheets|javascripts|images|fonts|style\.css) {
        proxy_pass http://vote:8080;
        access_log off;
    }

    # 6. App de Votación Principal (Java)
    location / {
        limit_req zone=voting_limit burst=1 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }
}