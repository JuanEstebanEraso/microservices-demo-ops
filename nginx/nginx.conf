limit_req_zone $http_x_forwarded_for zone=voting_limit:10m rate=100r/m;

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Dashboard de Resultados
    location /results/ {
        limit_req zone=voting_limit burst=20 nodelay;
        proxy_pass http://result:80/; 
    }

    # 2. TRÁFICO DE SOCKET.IO (La pieza que falta)
    # Esto captura las conexiones de datos en tiempo real de la App de Resultados
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # 3. Archivos Estáticos (CSS, JS, Imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|svg)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 4. App de Votación (Java) - Solo entra aquí si no es nada de lo anterior
    location / {
        limit_req zone=voting_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }

    # 5. Health Check
    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }
}