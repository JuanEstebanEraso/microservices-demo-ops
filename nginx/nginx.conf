# 1. Definición del límite (SE MANTIENE IGUAL)
limit_req_zone $remote_addr zone=voting_limit:10m rate=1r/s;

server {
    listen 80;

    # Headers globales para Websockets y Proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 1. Health Check (SE MANTIENE IGUAL)
    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }

    # 2. App de Resultados (Dashboard)
    location /results/ {
        limit_req zone=voting_limit burst=1 nodelay;
        limit_req_status 429;
        proxy_pass http://result:80/;
    }

    # 3. Socket.io (REFORZADO para quitar el error 400)
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 4. Assets de RESULTADOS (JS/CSS) 
    # Quitamos el '^/' para que encuentre el style.css aunque venga de /results/
    location ~* (angular\.min\.js|app\.js|socket\.io\.js|style\.css)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 5. Assets de VOTACIÓN (Java)
    location ~* ^/(stylesheets|javascripts|images|fonts)/ {
        proxy_pass http://vote:8080;
        access_log off;
    }

    # 6. App de Votación Principal (Java)
    location / {
        limit_req zone=voting_limit burst=1 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }
}