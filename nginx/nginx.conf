# 1. Límite: Mantenemos 1r/s pero subimos el burst a 10.
# Sin un burst decente, el navegador nunca podrá bajar el JS y el CSS a la vez.
limit_req_zone $remote_addr zone=voting_limit:10m rate=1r/s;

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location /health {
        access_log off;
        return 200 'gateway ok';
    }

    # 2. ASSETS DE RESULTADOS (Angular/Node)
    # Detectamos estos archivos por nombre, sin importar la ruta.
    location ~* (angular\.min\.js|app\.js|socket\.io\.js)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 3. CONFLICTO DE STYLE.CSS (El truco del Referer)
    location = /style.css {
        # Si la petición viene de la página de resultados, mándalo a 'result'
        if ($http_referer ~* /results/) {
            proxy_pass http://result:80/style.css;
        }
        # Por defecto (voto), mándalo a 'vote'
        proxy_pass http://vote:8080/style.css;
    }

    # 4. ASSETS DE VOTACIÓN (Java)
    location ~* ^/(stylesheets|javascripts|images|fonts)/ {
        proxy_pass http://vote:8080;
        access_log off;
    }

    # 5. SOCKET.IO
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 6. APP DE RESULTADOS
    location /results/ {
        limit_req zone=voting_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://result:80/;
    }

    # 7. APP DE VOTACIÓN (RAÍZ)
    location / {
        limit_req zone=voting_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }
}