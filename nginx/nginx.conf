limit_req_zone $http_x_forwarded_for zone=voting_limit:10m rate=100r/m;

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Dashboard de Resultados
    location /results/ {
        limit_req zone=voting_limit burst=20 nodelay;
        proxy_pass http://result:80/; 
    }

    # 2. Tráfico de Sockets (Vital para las gráficas en vivo)
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # 3. Archivos de la App de Resultados (Node.js)
    # Estos archivos están en la raíz de la app de resultados
    location ~* ^/(angular\.min\.js|app\.js|style\.css|socket\.io\.js)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 4. Archivos de la App de Votación (Java)
    # Java usa carpetas como /stylesheets/ y /javascripts/
    # Esta regla asegura que esas carpetas siempre vayan a la App de Votación
    location ~* ^/(stylesheets|javascripts|images|fonts)/ {
        proxy_pass http://vote:8080;
        access_log off;
    }

    # 5. App de Votación (Ruta principal)
    location / {
        limit_req zone=voting_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }

    # 6. Health Check para Azure
    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }
}