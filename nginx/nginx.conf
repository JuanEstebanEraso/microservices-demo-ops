limit_req_zone $http_x_forwarded_for zone=voting_limit:10m rate=100r/m;

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Dashboard de Resultados (Node.js)
    location /results/ {
        limit_req zone=voting_limit burst=20 nodelay;
        proxy_pass http://result:80/; 
    }

    # 2. Sockets (Datos en vivo de Resultados)
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # 3. ARCHIVOS DE RESULTADOS (Los que vemos en verde en tu consola)
    # Estos archivos Node los sirve en la raíz, por eso los atrapamos específicamente.
    location ~* ^/(angular\.min\.js|app\.js|socket\.io\.js)$ {
        proxy_pass http://result:80;
    }

    # 4. EL ESTILO DE RESULTADOS (El que te sale en rojo)
    # Lo forzamos a que lo busque en el contenedor de Result.
    location = /style.css {
        proxy_pass http://result:80/style.css;
    }

    # 5. ARCHIVOS DE VOTACIÓN (Java)
    # Esta es la clave: Java usa carpetas como /stylesheets/ o /javascripts/.
    # Al enviarlas a vote:8080, recuperamos el diseño de la página principal.
    location ~* ^/(stylesheets|javascripts|images|fonts)/ {
        proxy_pass http://vote:8080;
    }

    # 6. Página de Votación Principal (Java)
    location / {
        limit_req zone=voting_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }

    # 7. Salud de Azure
    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }
}