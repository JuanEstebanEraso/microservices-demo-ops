limit_req_zone $remote_addr zone=voting_limit:10m rate=1r/s;


server {
    listen 80;

    # Headers globales (Vital para que socket.io no dé error 400)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 1. App de Resultados (Dashboard)
    location /results/ {
        limit_req zone=voting_limit burst=0;
        limit_req_status 429;
        proxy_pass http://result:80/;
    }

    # 2. Socket.io (Configuración reforzada para Websockets)
    location /socket.io/ {
        proxy_pass http://result:80/socket.io/;
        proxy_read_timeout 86400;
    }

    # 3. Assets de RESULTADOS (Los que Node.js sirve en la raíz)
    # Usamos un regex que atrape específicamente el style.css que te falla
    location ~* ^/(angular\.min\.js|app\.js|socket\.io\.js|style\.css)$ {
        proxy_pass http://result:80;
        access_log off;
    }

    # 4. Assets de VOTACIÓN (Java)
    # Java usa carpetas (/stylesheets/). Esto evita que se crucen con los de Node.
    location ~* ^/(stylesheets|javascripts|images|fonts)/ {
        proxy_pass http://vote:8080;
        access_log off;
    }

    # 5. App de Votación Principal (Java)
    location / {
       # Sin burst. La primera pasa, la segunda (en el mismo segundo) muere.
        limit_req zone=voting_limit burst=0;
        limit_req_status 429;
        proxy_pass http://vote:8080;
    }

    # 6. Health Check
    location /health {
        access_log off;
        return 200 'gateway ok';
        add_header Content-Type text/plain;
    }
}