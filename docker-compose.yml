version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vote
      - result
    networks:
      - voting-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - voting-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  vote:
    image: ${ACR_LOGIN_SERVER}/vote:${IMAGE_TAG:-latest}
    container_name: vote
    extra_hosts:
      - "eventhub-app.servicebus.windows.net:4.206.228.223"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: eventhub-app.servicebus.windows.net:9093
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: "$$ConnectionString"
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
    networks:
      - voting-network
    restart: unless-stopped

  # Definimos una base para los workers para no repetir código
  worker-1: &worker_base
    image: ${ACR_LOGIN_SERVER}/worker:${IMAGE_TAG:-latest}
    container_name: worker-1
    extra_hosts:
      - "postgresql:${POSTGRES_IP}"
      - "eventhub-app.servicebus.windows.net:4.206.228.223"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: eventhub-app.servicebus.windows.net:9093
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: "$$ConnectionString"
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
      KAFKA_GROUP_ID: workers
      # CAMBIO CLAVE: Usamos el alias 'postgresql' definido en extra_hosts
      DATABASE_HOST: postgresql
      POSTGRES_HOST: postgresql
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_SSL: "true"
    networks:
      - voting-network
    restart: unless-stopped

  worker-2:
    <<: *worker_base
    container_name: worker-2

  worker-3:
    <<: *worker_base
    container_name: worker-3

  result:
    image: ${ACR_LOGIN_SERVER}/result:${IMAGE_TAG:-latest}
    container_name: result
    ports:
      - "5001:80"
    extra_hosts:
      - "postgresql:${POSTGRES_IP}"
    environment:
      # CAMBIO CLAVE: También aquí usamos el alias
      DATABASE_HOST: postgresql
      POSTGRES_HOST: postgresql
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_SSL: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

networks:
  voting-network:
    driver: bridge