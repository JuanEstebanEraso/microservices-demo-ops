version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vote
      - result
    networks:
      - voting-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - voting-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  vote:
    image: ${ACR_LOGIN_SERVER}/vote:${IMAGE_TAG:-latest}
    container_name: vote
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${EVENTHUB_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: $ConnectionString
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
    networks:
      - voting-network
    restart: unless-stopped

  worker-1:
    image: ${ACR_LOGIN_SERVER}/worker:${IMAGE_TAG:-latest}
    container_name: worker-1
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${EVENTHUB_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: $ConnectionString
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
      KAFKA_GROUP_ID: workers
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_SSL: "true"
    networks:
      - voting-network
    restart: unless-stopped

  worker-2:
    image: ${ACR_LOGIN_SERVER}/worker:${IMAGE_TAG:-latest}
    container_name: worker-2
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${EVENTHUB_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: $ConnectionString
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
      KAFKA_GROUP_ID: workers
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_SSL: "true"
    networks:
      - voting-network
    restart: unless-stopped

  worker-3:
    image: ${ACR_LOGIN_SERVER}/worker:${IMAGE_TAG:-latest}
    container_name: worker-3
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${EVENTHUB_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_USERNAME: $ConnectionString
      KAFKA_SASL_PASSWORD: ${EVENTHUB_CONNECTION_STRING}
      KAFKA_TOPIC: votes
      KAFKA_GROUP_ID: workers
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_SSL: "true"
    networks:
      - voting-network
    restart: unless-stopped

  result:
    image: ${ACR_LOGIN_SERVER}/result:${IMAGE_TAG:-latest}
    container_name: result
    environment:
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_SSL: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

networks:
  voting-network:
    driver: bridge
